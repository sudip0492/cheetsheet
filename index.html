<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudipta's Cheatsheet</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="dark">
    <div class="app">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="logo" id="homeLogo" style="cursor: pointer;" onclick="showHomeView()">
          <i class="ph-fill ph-book-bookmark"></i> Sudipta's Cheatsheet
        </div>

        <div class="menu-title">CHEAT SHEETS</div>

        <div id="topic-list">
          <div class="loading-text">Loading topics...</div>
        </div>
      </aside>

      <!-- MAIN CONTENT -->

      <main class="content">
        <header class="page-header">
          <div class="header-left">
            <button class="mobile-home-btn" onclick="showHomeView()" aria-label="Go to Home">
              <i class="ph-bold ph-house"></i>
            </button>
            <h1 id="title">
              <i class="ph-fill ph-book-bookmark"></i> Sudipta's Cheatsheet
            </h1>
          </div>
          <div class="theme">
            <label class="theme-switch" aria-label="Toggle Dark Mode">
              <input type="checkbox" id="themeToggle" checked />
              <div class="slider">
                <i class="ph-fill ph-sun icon-sun"></i>
                <i class="ph-fill ph-moon icon-moon"></i>
                <div class="knob"></div>
              </div>
            </label>
          </div>
        </header>

        <!-- HOME PAGE VIEW -->
        <div id="homeView" style="display: none;">
          <div class="hero">
            <h2>Welcome to Sudipta's Cheatsheet</h2>
            <p>Your ultimate quick-reference guide for developer tools and commands. Select a topic below to get started!</p>
          </div>
          <div id="home-topic-grid" class="home-grid"></div>
        </div>

        <!-- CHEATSHEET VIEW -->
        <div id="cheatsheetView">
          <div class="search-container">
            <i class="ph ph-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search shortcuts..." disabled />
          </div>

          <div id="content"></div>
        </div>

        <footer>
          <p>&copy; <span id="year"></span> Sudipta's Cheatsheet. <a href="https://sudip0492.vercel.app/" target="_blank" rel="noopener noreferrer">Sudipta</a></p>
        </footer>
      </main>
    </div>

    <!-- COMMAND DETAILS MODAL -->
    <div id="cmdModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalCmd"></h2>
          <button class="close-btn" onclick="closeModal()" aria-label="Close modal"><i class="ph ph-x"></i></button>
        </div>
        <p id="modalDesc" class="modal-desc"></p>
        
        <div id="modalDetailsBox" class="modal-details-box">
          <p id="modalDetails"></p>
          <div class="modal-example" id="modalExampleSection">
            <h4>Example Usage</h4>
            <pre><code id="modalExampleCode"></code></pre>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
